<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Framer Force Message Sanitizer  </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FAVICON -->
<link rel="icon" type="image/svg+xml"
  href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234f46e5'/><text x='50%' y='60%' text-anchor='middle' font-size='52' fill='white'>S</text></svg>">
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<h1>Framer Message Sanitizer</h1>

<div class="main">

  <!-- INPUT -->
  <div class="card">
    <h2>Input Message</h2>
    <textarea id="inputText" placeholder="Type your Fiverr message here..."></textarea>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <h2>Sanitized Output</h2>
    <div id="outputText" class="output-box"></div>

    <div class="actions">
      <button class="btn" id="copyBtn" onclick="copyText()">📋 Copy</button>
      <button class="btn secondary" id="toggleLang" onclick="toggleTranslate()">Bengali</button>
    </div>
  </div>

</div>

<!-- FORBIDDEN WORDS -->
<div class="forbidden card">
  <h2>Forbidden / Reserved Keywords</h2>

  <div class="add-word">
    <input type="text" id="newWord" placeholder="Add extra forbidden word">
    <button class="btn" onclick="addForbiddenWord()">Add</button>
  </div>

  <div class="tags" id="forbiddenList"></div>
</div>

</div>

<script src="main.js"></script>

</body>
</html>
